version: 2
updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  # Keep Python dependencies up to date
  - package-ecosystem: "pip"
    directory: "/libs/core"
    schedule:
      interval: "weekly"
    groups:
      python-deps:
        patterns: ["*"]
