name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token scope for every job (CodeQL: actions/missing-workflow-permissions).
permissions:
  contents: read

jobs:
  lint:
    # Runs ruff directly rather than `make lint` (which also runs `make
    # deptry`): deptry needs the full workspace installed, so it gets its own
    # `deptry` job below. Local `make lint` therefore covers more than this
    # job — that's intentional, the two are split by install cost.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "**/pyproject.toml"
      - run: pip install ruff
      - run: ruff check libs/ cli/ examples/
      - run: ruff format --check libs/ cli/ examples/

  ts-types:
    # Drift guard for libs/spec/ts/genblaze.d.ts. Fails if a schema changed
    # without `make ts-types` being run. See libs/spec/README.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "20"
      - name: Regenerate TS types
        run: make ts-types
      - name: Verify no drift
        run: |
          if ! git diff --exit-code libs/spec/ts/; then
            echo "::error::libs/spec/ts/ is out of date. Run 'make ts-types' locally and commit."
            exit 1
          fi
      - name: Type-check generated .d.ts
        run: npx --yes -p typescript@5.4 tsc --noEmit --strict --skipLibCheck libs/spec/ts/genblaze.d.ts

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "**/pyproject.toml"
      - name: Install dependencies
        run: |
          pip install -e "libs/core[dev]"
          pip install -e "libs/connectors/replicate[dev]"
          pip install -e "libs/connectors/s3[dev]"
          pip install -e "libs/connectors/openai[dev]"
          pip install -e "libs/connectors/google[dev]"
          pip install -e "libs/connectors/runway[dev]"
          pip install -e "libs/connectors/luma[dev]"
          pip install -e "libs/connectors/decart[dev]"
          pip install -e "libs/connectors/elevenlabs[dev]"
          pip install -e "libs/connectors/stability-audio[dev]"
          pip install -e "libs/connectors/lmnt[dev]"
          pip install -e "libs/connectors/hume[dev]"
          pip install -e "libs/connectors/gmicloud[dev]"
          pip install -e "libs/connectors/langsmith[dev]"
          pip install -e "libs/connectors/nvidia[dev]"
          pip install -e "libs/connectors/assemblyai[dev]"
          pip install -e "cli[dev]"
          pip install mypy
      - name: Typecheck core
        run: mypy libs/core/genblaze_core/ --ignore-missing-imports
      - name: Typecheck connectors
        run: |
          failed=""
          for conn in replicate s3 openai google runway luma decart elevenlabs stability-audio lmnt hume gmicloud langsmith nvidia assemblyai; do
            echo "=== Typechecking $conn ==="
            if ! mypy libs/connectors/$conn/genblaze_*/ --ignore-missing-imports; then
              failed="$failed $conn"
            fi
          done
          if [ -n "$failed" ]; then
            echo "::error::Typecheck failed for:$failed"
            exit 1
          fi

  deptry:
    # Dependency hygiene gate. `pip check` proves the installed set has no
    # conflicting/missing transitive deps; `make deptry` proves every package
    # declares what it imports — the replicate/httpx clean-install crash class
    # (#37/#106). Both run against the editable workspace install (deptry maps
    # imports to packages via installed metadata). NOTE: `pip install -e`
    # ignores version constraints, so `pip check` here does NOT exercise
    # published-pin resolution or floor conflicts — that's the constraint-
    # respecting wheel install in `make release-smoke` at tag time, and the
    # per-PR resolve-check is a documented follow-up.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "**/pyproject.toml"
      - name: Install workspace (editable, all dev extras; deptry ships in core[dev])
        run: make install-dev
      - name: Dependency consistency (pip check)
        run: pip check
      - name: Dependency hygiene (deptry)
        run: make deptry

  build:
    # Smoke-build every published package on every PR so packaging
    # regressions (e.g. broken hatch dynamic-version sources, missing
    # README, malformed classifiers) are caught here, not at release
    # time when .github/workflows/release.yml runs the same `python -m
    # build` + `twine check` pipeline against PyPI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "**/pyproject.toml"
      - run: pip install build twine
      - name: Build and twine-check every package
        # Failures are collected explicitly so one broken package
        # doesn't mask the others — useful when a refactor touches
        # multiple packaging configs at once. ``rm -rf dist/`` per
        # iteration matters because GitHub's "Re-run failed jobs"
        # button reuses the workspace; without it, a re-run would
        # ``twine check`` stale wheels from the prior attempt.
        run: |
          failed=""
          for pkg in libs/core cli libs/meta libs/connectors/*/; do
            pkg="${pkg%/}"
            echo "=== Building $pkg ==="
            if ! (cd "$pkg" && rm -rf dist && python -m build && twine check dist/*); then
              failed="$failed $pkg"
            fi
          done
          if [ -n "$failed" ]; then
            echo "::error::Build/twine-check failed for:$failed"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "**/pyproject.toml"
      - name: Install dependencies
        run: |
          pip install -e "libs/core[dev]"
          pip install -e "libs/connectors/replicate[dev]"
          pip install -e "libs/connectors/s3[dev]"
          pip install -e "libs/connectors/openai[dev]"
          pip install -e "libs/connectors/google[dev]"
          pip install -e "libs/connectors/runway[dev]"
          pip install -e "libs/connectors/luma[dev]"
          pip install -e "libs/connectors/decart[dev]"
          pip install -e "libs/connectors/elevenlabs[dev]"
          pip install -e "libs/connectors/stability-audio[dev]"
          pip install -e "libs/connectors/lmnt[dev]"
          pip install -e "libs/connectors/hume[dev]"
          pip install -e "libs/connectors/gmicloud[dev]"
          pip install -e "libs/connectors/langsmith[dev]"
          pip install -e "libs/connectors/nvidia[dev]"
          pip install -e "libs/connectors/assemblyai[dev]"
          pip install -e "cli[dev]"
          pip install pytest-cov
      - name: Run core tests with coverage
        run: |
          cd libs/core && pytest tests/ -v --cov=genblaze_core --cov-report=xml --cov-report=term-missing
      - name: Run connector tests
        run: |
          for conn in replicate s3 openai google runway luma decart elevenlabs stability-audio lmnt hume gmicloud langsmith nvidia assemblyai; do
            echo "=== Testing $conn ==="
            (cd libs/connectors/$conn && pytest -v)
          done
      - name: Run CLI tests
        run: |
          cd cli && pytest tests/ -v
      - name: Run release-tooling tests
        run: |
          pytest tools/tests/ -v
      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          file: libs/core/coverage.xml
          fail_ci_if_error: false
